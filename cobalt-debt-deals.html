<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cobalt Credit Prospecting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --bg: #f6f8fb; --surface: #ffffff; --surface-sunk: #eef1f6;
    --ink: #0f1e33; --ink-soft: #5b6b82; --ink-faint: #8a97a8; --line: #e2e8f0;
    --cobalt: #0047AB; --cobalt-dark: #002347; --cobalt-tint: #e7edf9;
    --amber: #9a6a12; --amber-tint: #fbf0dd;
    --green: #0f7a4a; --green-tint: #e3f2ea;
    --red: #b3261e; --red-tint: #f8e9e7;
    --grey-tint: #eef1f4;
    --radius: 8px;
    --shadow: 0 1px 2px rgba(15,30,51,0.04), 0 8px 24px -12px rgba(15,30,51,0.14);
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:'IBM Plex Sans',system-ui,-apple-system,sans-serif; font-feature-settings:'tnum' 1; font-variant-numeric: tabular-nums; }
  .display{ font-family:'Sora',sans-serif; }
  .wrap{ max-width:1320px; margin:0 auto; padding:28px 28px 80px; }

  .topbar{ display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:22px; flex-wrap:wrap; }
  .brand{ display:flex; flex-direction:column; align-items:flex-start; gap:10px; }
  .brand-mark{ display:flex; align-items:center; flex-shrink:0; }
  .brand-mark svg{ height:40px; width:auto; display:block; }
  .brand h1{ font-size:20px; margin:0; font-weight:600; letter-spacing:-0.01em; }
  .brand p{ margin:1px 0 0; font-size:12.5px; color:var(--ink-soft); }
  .actions{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

  button{ font-family:inherit; cursor:pointer; }
  .btn{ border:1px solid var(--line); background:var(--surface); color:var(--ink); padding:8px 14px; border-radius:6px;
    font-size:12.5px; font-weight:600; display:inline-flex; align-items:center; gap:7px; transition:border-color .15s, background .15s; }
  .btn:hover{ border-color:var(--cobalt); background:var(--cobalt-tint); }
  .btn-primary{ background:var(--cobalt); border-color:var(--cobalt); color:#fff; }
  .btn-primary:hover{ background:var(--cobalt-dark); border-color:var(--cobalt-dark); }
  .btn-ghost{ color:var(--ink-soft); }
  .btn-ghost:hover{ background:var(--surface-sunk); color:var(--ink); border-color:var(--ink-faint); }
  .btn-danger{ color:var(--red); border-color:var(--red-tint); background:var(--red-tint); }
  .btn-danger:hover{ background:#f3d9d6; border-color:var(--red); color:var(--red); }
  .btn:disabled{ opacity:.45; cursor:not-allowed; }

  .summary{ display:grid; grid-template-columns:repeat(5,1fr); gap:1px; background:var(--line); border:1px solid var(--line);
    border-radius:var(--radius); overflow:hidden; margin-bottom:20px; }
  .summary .cell{ background:var(--surface); padding:14px 16px; }
  .summary .num{ font-family:'Source Serif 4',serif; font-size:24px; font-weight:600; line-height:1; }
  .summary .lbl{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); margin-top:5px; text-transform:uppercase; letter-spacing:.08em; }
  .summary .num.warn{ color:var(--amber); }
  .summary .num.accent{ color:var(--cobalt); }

  .filterbar{ display:flex; gap:10px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
  .filterbar select, .filterbar input[type=text]{ padding:8px 11px; border:1px solid var(--line); border-radius:8px; font-size:13px;
    font-family:inherit; background:var(--surface); color:var(--ink); }
  .filterbar input[type=text]{ min-width:220px; }
  .filterbar .spacer{ flex:1; }
  .count-pill{ font-size:12px; color:var(--ink-soft); }

  .tablewrap{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow-x:auto; box-shadow:var(--shadow); }
  table{ width:100%; border-collapse:collapse; font-size:12.5px; }
  thead th{ text-align:left; font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.07em; color:var(--ink-soft);
    padding:11px 14px; background:var(--surface-sunk); border-bottom:1px solid var(--line); font-weight:600; white-space:nowrap; cursor:pointer; }
  thead th:hover{ color:var(--ink); }
  thead th.sorted{ color:var(--cobalt); }
  tbody tr{ border-bottom:1px solid var(--line); }
  tbody tr:last-child{ border-bottom:none; }
  tbody tr:hover{ background:#FAFBFC; }
  td{ padding:8px 10px; vertical-align:middle; }
  .company-name{ font-weight:600; max-width:170px; }
  .company-name[data-act="expandname"]:hover{ color:var(--cobalt); text-decoration:underline; }
  .company-sub{ font-size:11px; color:var(--ink-faint); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:170px; }

  .badge{ display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap; }
  .badge.instrument{ background:var(--cobalt-tint); color:var(--cobalt-dark); }
  .badge.linked{ background:var(--green-tint); color:var(--green); cursor:pointer; }

  select.compact-select{ font-size:12px; padding:4px 6px; border:1px solid var(--line); border-radius:6px; font-family:inherit; background:var(--surface); }
  input.compact-input{ font-size:12px; padding:4px 6px; border:1px solid var(--line); border-radius:6px; font-family:inherit; width:90px; }
  input.touch-date{ font-size:12px; padding:4px 6px; border:1px solid var(--line); border-radius:6px; font-family:inherit; width:112px; }
  .overdue{ color:var(--red); font-weight:600; }

  select.stage-select{ font-size:12px; font-weight:600; padding:5px 8px; border-radius:6px; border:1px solid var(--line); font-family:inherit; background:var(--surface); }
  .st-Prospecting{ background:var(--grey-tint); border-color:var(--grey-tint); }
  .st-Qualifying{ background:var(--amber-tint); border-color:var(--amber-tint); color:var(--amber); }
  .st-Structuring{ background:var(--cobalt-tint); border-color:var(--cobalt-tint); color:var(--cobalt-dark); }
  .st-TermSheetOut{ background:#DCEBFF; border-color:#DCEBFF; color:var(--cobalt-dark); }
  .st-Executing{ background:var(--green-tint); border-color:var(--green-tint); color:var(--green); }
  .st-Funded{ background:var(--green); border-color:var(--green); color:#fff; }
  .st-Dead{ background:var(--red-tint); border-color:var(--red-tint); color:var(--red); }

  .row-actions{ display:flex; gap:4px; }
  .icon-btn{ background:transparent; border:none; color:var(--ink-faint); padding:5px; border-radius:6px; display:flex; }
  .icon-btn:hover{ background:var(--surface-sunk); color:var(--ink); }

  .notes-row td{ background:#FAFBFC; padding:0 14px 14px; }
  .detail-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:12px; padding-top:12px; }
  .detail-grid label{ display:block; font-size:10.5px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.04em; margin-bottom:3px; }
  .detail-grid input, .detail-grid select{ width:100%; padding:6px 8px; border:1px solid var(--line); border-radius:6px; font-size:12.5px; font-family:inherit; }
  .link-row{ display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
  .link-row input{ flex:1; min-width:200px; padding:7px 9px; border:1px solid var(--line); border-radius:7px; font-size:12.5px; font-family:inherit; }
  .link-results{ position:relative; }
  .link-dropdown{ position:absolute; top:100%; left:0; right:0; background:var(--surface); border:1px solid var(--line); border-radius:8px;
    box-shadow:var(--shadow); z-index:20; max-height:180px; overflow-y:auto; }
  .link-dropdown div{ padding:8px 10px; font-size:12.5px; cursor:pointer; }
  .link-dropdown div:hover{ background:var(--surface-sunk); }
  .notes-log{ max-height:140px; overflow-y:auto; margin-bottom:8px; }
  .note-entry{ background:var(--surface); border:1px solid var(--line); border-radius:8px; padding:8px 10px; margin-bottom:6px; font-size:12.5px; }
  .note-entry .meta{ font-size:10.5px; color:var(--ink-faint); margin-bottom:3px; }
  .note-add-row{ display:flex; gap:8px; align-items:flex-start; }
  .note-add-row textarea{ flex:1; min-height:44px; border:1px solid var(--line); border-radius:8px; padding:9px 11px; font-family:inherit; font-size:12.5px; resize:vertical; }

  .empty{ text-align:center; padding:70px 20px; color:var(--ink-soft); }
  .empty .display{ font-size:22px; color:var(--ink); margin-bottom:8px; }
  .empty p{ max-width:420px; margin:0 auto 18px; font-size:13.5px; line-height:1.5; }

  .overlay{ position:fixed; inset:0; background:rgba(21,23,28,0.45); display:flex; align-items:center; justify-content:center; z-index:50; padding:24px; }
  .modal{ background:var(--surface); border-radius:14px; width:100%; max-width:560px; max-height:88vh; overflow-y:auto; box-shadow:0 24px 60px -20px rgba(0,0,0,0.35); }
  .modal-head{ padding:20px 24px 4px; }
  .modal-head h2{ font-size:18px; margin:0 0 4px; }
  .modal-head p{ font-size:12.5px; color:var(--ink-soft); margin:0; }
  .modal-body{ padding:14px 24px 20px; }
  .modal-foot{ display:flex; justify-content:space-between; align-items:center; padding:14px 24px 22px; gap:10px; }
  .map-row{ display:grid; grid-template-columns:170px 1fr; gap:12px; align-items:center; padding:7px 0; border-bottom:1px solid var(--line); }
  .map-row:last-of-type{ border-bottom:none; }
  .map-row label{ font-size:12.5px; font-weight:600; color:var(--ink); }
  .map-row label span{ display:block; font-weight:400; color:var(--ink-faint); font-size:11px; margin-top:1px; }
  .map-row select, .map-row input[type=text]{ padding:7px 9px; border:1px solid var(--line); border-radius:7px; font-size:12.5px; font-family:inherit; width:100%; }
  .field-block{ margin-bottom:14px; }
  .field-block label{ display:block; font-size:12.5px; font-weight:600; margin-bottom:5px; }
  .field-block input, .field-block select{ width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:7px; font-size:13px; font-family:inherit; }

  .toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px;
    border-radius:8px; font-size:12.5px; z-index:100; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-4px); }

  .authgate{ position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:200; padding:24px; }
  .authcard{ background:var(--surface); border:1px solid var(--line); border-radius:14px; width:100%; max-width:380px; padding:28px 28px 24px; box-shadow:var(--shadow); }
  .authcard h1{ font-size:20px; margin:0 0 3px; }
  .authcard p.sub{ font-size:12.5px; color:var(--ink-soft); margin:0 0 20px; }
  .authcard label{ display:block; font-size:12px; font-weight:600; margin-bottom:5px; margin-top:14px; }
  .authcard input{ width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:8px; font-size:13.5px; font-family:inherit; }
  .authcard .btn-primary{ width:100%; justify-content:center; margin-top:18px; padding:10px; }
  .authcard .err{ font-size:12.5px; color:var(--red); margin-top:10px; display:none; }
  .authcard .err.show{ display:block; }

  #fileInput, #backupInput{ display:none; }
  ::selection{ background:var(--cobalt-tint); }
</style>
</head>
<body>

<div class="authgate" id="authGate">
  <div class="authcard">
    <h1 class="display" id="authTitle">Sign in</h1>
    <p class="sub">Cobalt Credit Prospecting — for the team only.</p>
    <label>Email</label>
    <input type="email" id="authEmail" autocomplete="username">
    <label>Password</label>
    <input type="password" id="authPassword" autocomplete="current-password">
    <button class="btn btn-primary" id="authSubmit">Sign in</button>
    <div class="err" id="authErr"></div>
  </div>
</div>

<div class="wrap" id="mainApp" style="display:none;">

  <div class="topbar">
    <div class="brand">

    return Object.assign(h, extra||{});

  async function authSignIn(email, password){
    var res = await fetch(AUTH+'/token?grant_type=password', { method:'POST', headers:{ 'apikey':SUPABASE_KEY, 'Content-Type':'application/json' }, body: JSON.stringify({ email:email, password:password }) });
    var data = await res.json();
    if(!res.ok) throw new Error(data.error_description || data.msg || 'Incorrect email or password');
    return data;
  }
  async function authRefresh(refreshToken){
    var res = await fetch(AUTH+'/token?grant_type=refresh_token', { method:'POST', headers:{ 'apikey':SUPABASE_KEY, 'Content-Type':'application/json' }, body: JSON.stringify({ refresh_token:refreshToken }) });
    var data = await res.json();
    if(!res.ok) throw new Error('refresh failed');
    return data;
  }
  function saveSession(data){
    var session = { access_token:data.access_token, refresh_token:data.refresh_token, expires_at: Date.now() + (data.expires_in||3600)*1000, email: data.user && data.user.email };
    state.session = session;
    try{ localStorage.setItem('cobalt_session', JSON.stringify(session)); }catch(e){}
  }
  function loadStoredSession(){
    try{ var raw = localStorage.getItem('cobalt_session'); if(raw) state.session = JSON.parse(raw); }catch(e){ state.session = null; }
  }
  function clearSession(){
    state.session = null;
    try{ localStorage.removeItem('cobalt_session'); }catch(e){}
  }
  async function ensureValidSession(){
    if(!state.session) return false;
    if(Date.now() < state.session.expires_at - 60000) return true;
    try{ saveSession(await authRefresh(state.session.refresh_token)); return true; }
    catch(e){ clearSession(); return false; }
  }

  $('confirmCsvImport').addEventListener('click', async function(){
    var pi = pendingDealImport;
    if(!pi) return;
    var m = pi.mapping;
    if(!m.companyName){ toast('Map a company name column to continue'); return; }

    var byKey = {};
    state.deals.forEach(function(d){ byKey[d.companyName.toLowerCase()] = d; });

    var added=0, updated=0, touched=[];
    pi.rows.forEach(function(row){
      var companyName = (row[m.companyName]||'').trim();
      if(!companyName) return;
      var key = companyName.toLowerCase();

      var fields = {
        companyName: companyName,
        industry: m.industry ? (row[m.industry]||'').trim() : '',
        instrumentType: m.instrumentType ? (row[m.instrumentType]||'').trim() : '',
        stage: m.stage ? ((row[m.stage]||'').trim() || 'Prospecting') : 'Prospecting',

        referralSource: m.referralSource ? (row[m.referralSource]||'').trim() : '',
        contactName: m.contactName ? (row[m.contactName]||'').trim() : '',
        phone: m.phone ? (row[m.phone]||'').trim() : '',
        email: m.email ? (row[m.email]||'').trim() : '',
        assignedTo: m.assignedTo ? (row[m.assignedTo]||'').trim() : ''
      };

      var existing = byKey[key];
      if(existing){
        Object.assign(existing, fields);
        updated++; touched.push(existing);
      } else {
        var rec = Object.assign({
          id: 'deal:'+Date.now()+Math.random().toString(36).slice(2,7),
          nextTouchDate:'', lastTouchDate:'', notesLog:[],
          linkedProspectId:null, linkedProspectName:null,
          createdAt:new Date().toISOString()
        }, fields);
        byKey[key] = rec;
        state.deals.push(rec);
        added++; touched.push(rec);
      }
    });

    try{ await upsertDealsRemote(touched); }
    catch(e){ toast('Saved locally, but syncing to the database failed — check your connection'); }
    $('csvOverlay').style.display = 'none';
    pendingDealImport = null;
    renderAll();
    toast(added+' new, '+updated+' updated');

  function renderSummary(){
    var total = state.deals.length;
    var pipeline = state.deals.reduce(function(s,d){ return s + (d.estimatedAmount||0); }, 0);
    var today = new Date().toISOString().slice(0,10);

    var active = state.deals.filter(function(d){ return d.stage!=='Dead' && d.stage!=='Funded'; }).length;
    var funded = state.deals.filter(function(d){ return d.stage==='Funded'; }).length;
    $('summary').innerHTML = [
      ['Total deals', total, ''], ['Pipeline value', fmtMoney(pipeline), 'accent'],
      ['Due for touch', due, due>0?'warn':''], ['Active', active, ''], ['Funded', funded, '']
    ].map(function(c){ return '<div class="cell"><div class="num '+c[2]+'">'+c[1]+'</div><div class="lbl">'+c[0]+'</div></div>'; }).join('');
  }

  function getFilteredSorted(){
    var f = state.filters;
    var rows = state.deals.filter(function(d){
      if(f.stage && d.stage!==f.stage) return false;
      if(f.instrument && d.instrumentType!==f.instrument) return false;
      if(f.assigned && d.assignedTo!==f.assigned) return false;
      if(f.referral && d.referralSource!==f.referral) return false;
      if(f.search){
        var hay = [d.companyName,d.contactName,d.phone,d.email,d.industry].join(' ').toLowerCase();
        if(hay.indexOf(f.search)===-1) return false;
      }
      return true;
    });
    var key = state.sort.key, dir = state.sort.dir==='asc'?1:-1;
    rows.sort(function(a,b){
      var av=a[key], bv=b[key];
      if(key==='nextTouchDate'){ av=av||'9999'; bv=bv||'9999'; }
      if(typeof av==='string') av=(av||'').toLowerCase();
      if(typeof bv==='string') bv=(bv||'').toLowerCase();
      if(av<bv) return -1*dir; if(av>bv) return 1*dir; return 0;
    });
    return rows;
  }

    var cols = [
      ['companyName','Company'],['industry','Industry'],['instrumentType','Instrument'],['stage','Stage'],
      ['estimatedAmount','Est. Amount'],['assignedTo','Assigned'],['referralSource','Source'],['nextTouchDate','Next touch'],['','']
    ];
    var today = new Date().toISOString().slice(0,10);
    var allChecked = rows.length>0 && rows.every(function(d){ return state.selected[d.id]; });
    var html = '<table><thead><tr><th style="width:32px;"><input type="checkbox" id="selectAllCheckbox"'+(allChecked?' checked':'')+'></th>' + cols.map(function(c){

    rows.forEach(function(d){
      var overdue = d.nextTouchDate && d.nextTouchDate<today && d.stage!=='Dead' && d.stage!=='Funded';
      var stClass = STAGE_CLASS[d.stage] || 'st-Prospecting';
      html += '<tr data-id="'+d.id+'">';
      html += '<td><input type="checkbox" class="row-select" data-act="select"'+(state.selected[d.id]?' checked':'')+'></td>';

      html += '<td><select class="stage-select '+stClass+'" data-act="stage">'+STAGES.map(function(s){ return '<option'+(s===d.stage?' selected':'')+'>'+s+'</option>'; }).join('')+'</select></td>';
      html += '<td>'+fmtMoney(d.estimatedAmount)+'</td>';
      html += '<td><select class="compact-select" data-act="assigned"><option value=""'+(d.assignedTo?'':' selected')+'>—</option>'+ASSIGNEES.filter(Boolean).map(function(a){ return '<option'+(a===d.assignedTo?' selected':'')+'>'+a+'</option>'; }).join('')+'</select></td>';
      html += '<td><select class="compact-select" data-act="referral"><option value=""'+(d.referralSource?'':' selected')+'>—</option>'+REFERRAL_SOURCES.filter(Boolean).map(function(r){ return '<option'+(r===d.referralSource?' selected':'')+'>'+r+'</option>'; }).join('')+'</select></td>';
      html += '<td><input type="date" class="touch-date '+(overdue?'overdue':'')+'" data-act="touch" value="'+(d.nextTouchDate||'')+'"></td>';
      html += '<td><div class="row-actions">'+
        '<button class="icon-btn" data-act="expand" title="Details & notes"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>'+
        '<button class="icon-btn btn-danger" data-act="delete" title="Delete"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg></button>'+
        '</div></td>';
      html += '</tr>';
      if(state.expanded[d.id]){
        html += '<tr class="notes-row" data-id="'+d.id+'"><td colspan="10">'+
          '<div style="font-size:12px;color:var(--ink);margin-bottom:6px;">'+(d.contactName?('Contact: '+esc(d.contactName)+'  '):'')+(d.phone?('· Phone: '+esc(d.phone)+'  '):'')+(d.email?('· Email: '+esc(d.email)):'')+'</div>'+
          '<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">'+
            '<button class="btn" data-act="runslb">Run SLB Calc</button>'+
            '<button class="btn" data-act="rundebtcap">Run Debt Capacity Calc</button>'+
            '<button class="btn" data-act="runaudit">Run Audit</button>'+
          '</div>'+
          '<div class="link-row">'+
            '<span style="font-size:12px;font-weight:600;">Link to CRE prospect:</span>'+
            '<div class="link-results" style="flex:1;min-width:200px;">'+
              '<input type="text" data-act="linksearch" placeholder="Search by owner name..." value="'+esc(d.linkedProspectName||'')+'">'+
              '<div class="link-dropdown" data-act="linkdropdown" style="display:none;"></div>'+
            '</div>'+
            (d.linkedProspectId ? '<button class="btn btn-ghost" data-act="unlink">Unlink</button>' : '')+
          '</div>'+
          (d.linkedProspectId ? '<div id="linkedDetail-'+d.id+'" style="font-size:12px;color:var(--ink-faint);margin-bottom:14px;background:var(--surface-sunk);border-radius:8px;padding:10px 12px;">'+renderLinkedDetailHtml(state.linkedProspectCache[d.id])+'</div>' : '')+
          '<div style="margin-bottom:14px;">'+
            '<div style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-faint);margin-bottom:6px;">Scenario history</div>'+
            '<div id="scenarioHistory-'+d.id+'" style="font-size:12px;color:var(--ink-faint);">'+renderScenarioHistoryHtml(state.scenarioCache[d.id])+'</div>'+
          '</div>'+
          '<div class="notes-log">'+
            ((d.notesLog && d.notesLog.length) ? d.notesLog.map(function(n){ return '<div class="note-entry"><div class="meta">'+esc(n.author||'')+' · '+esc(formatWhen(n.at))+'</div>'+esc(n.text)+'</div>'; }).join('') : '<div style="font-size:12px;color:var(--ink-faint);">No notes yet.</div>')+
          '</div>'+
          '<div class="note-add-row">'+
            '<textarea data-act="newnote" placeholder="Add a call note, next step..."></textarea>'+
            '<button class="btn btn-primary" data-act="addnote">Add note</button>'+
          '</div>'+
          '</td></tr>';
      }
    });
    html += '</tbody></table>';
    $('tableWrap').innerHTML = html;
    attachTableHandlers();
  }

  function attachTableHandlers(){
    document.querySelectorAll('thead th').forEach(function(th){
      th.addEventListener('click', function(){
        var key = th.getAttribute('data-key'); if(!key) return;
        if(state.sort.key===key){ state.sort.dir = state.sort.dir==='asc'?'desc':'asc'; }
        else { state.sort.key = key; state.sort.dir = 'asc'; }
        renderTable();
      });
    });
    var selectAll = $('selectAllCheckbox');
    if(selectAll) selectAll.addEventListener('change', function(){
      var checked = this.checked;
      document.querySelectorAll('tbody tr[data-id]').forEach(function(tr){ state.selected[tr.getAttribute('data-id')] = checked; });
      renderTable();
    });

    document.querySelectorAll('tbody tr[data-id]').forEach(function(tr){
      var id = tr.getAttribute('data-id');
      var rec = state.deals.find(function(d){ return d.id===id; });
      if(!rec) return;

      var selectBox = tr.querySelector('[data-act="select"]');
      if(selectBox) selectBox.addEventListener('change', function(){ state.selected[id] = this.checked; });

      function wireSelect(act, field, dbField){
        var el = tr.querySelector('[data-act="'+act+'"]');
        if(el && el.tagName==='SELECT') el.addEventListener('change', async function(){
          rec[field] = this.value; renderTable();
          try{ var patch={}; patch[dbField]=rec[field]; await patchDealRemote(rec.id, patch); }
          catch(e){ toast('Not saved — check your connection'); }
        });
      }
      wireSelect('instrument','instrumentType','instrument_type');
      wireSelect('stage','stage','stage');
      wireSelect('assigned','assignedTo','assigned_to');
      wireSelect('referral','referralSource','referral_source');

      var touchInput = tr.querySelector('[data-act="touch"]');
      if(touchInput) touchInput.addEventListener('change', async function(){
        rec.nextTouchDate = this.value; renderTable();
        try{ await patchDealRemote(rec.id, { next_touch_date: rec.nextTouchDate }); }
        catch(e){ toast('Date not saved — check your connection'); }
      });

      function toggleExpand(){
        state.expanded[id] = !state.expanded[id];
        renderTable();
        if(state.expanded[id]){
          loadScenarioHistoryForDealRow(rec);
          if(rec.linkedProspectId) loadLinkedDetailFor(rec);
        }
      }
      var expandBtn = tr.querySelector('[data-act="expand"]');
      if(expandBtn) expandBtn.addEventListener('click', toggleExpand);
      var expandNameEl = tr.querySelector('[data-act="expandname"]');
      if(expandNameEl) expandNameEl.addEventListener('click', toggleExpand);

      var runSlbBtn = tr.querySelector('[data-act="runslb"]');
      if(runSlbBtn) runSlbBtn.addEventListener('click', function(){
        var cached = state.linkedProspectCache[rec.id];
        var params = new URLSearchParams();
        params.set('deal_id', rec.id);
        params.set('name', rec.companyName);
        if(cached && cached.property_value!=null) params.set('salePrice', cached.property_value);
        else if(rec.estimatedAmount!=null) params.set('salePrice', rec.estimatedAmount);
        if(cached && cached.lien_balance!=null) params.set('existingDebt', cached.lien_balance);
        window.open('https://cobaltcommercialcredit.github.io/cobalt-slb-calculator/?'+params.toString(), '_blank');
      });
      var runDebtCapBtn = tr.querySelector('[data-act="rundebtcap"]');
      if(runDebtCapBtn) runDebtCapBtn.addEventListener('click', function(){
        var cached = state.linkedProspectCache[rec.id];
        var params = new URLSearchParams();
        params.set('deal_id', rec.id);
        params.set('name', rec.companyName);
        if(cached && cached.property_value!=null) params.set('propertyValue', cached.property_value);
        else if(rec.estimatedAmount!=null) params.set('propertyValue', rec.estimatedAmount);
        window.open('https://cobaltcommercialcredit.github.io/cobalt-debt-capacity-calc/?'+params.toString(), '_blank');
      });
      var runAuditBtn = tr.querySelector('[data-act="runaudit"]');
      if(runAuditBtn) runAuditBtn.addEventListener('click', function(){
        var params = new URLSearchParams();
        params.set('deal_id', rec.id);
        params.set('name', rec.companyName);
        window.open('https://cobaltcommercialcredit.github.io/cobalt-treasury-audit/?'+params.toString(), '_blank');
      });

      var delBtn = tr.querySelector('[data-act="delete"]');
      if(delBtn) delBtn.addEventListener('click', async function(){
        if(!confirm('Delete '+rec.companyName+' from the pipeline for everyone?')) return;
        try{ await patchDealRemoteDelete(); }catch(e){}
        try{ await fetch(REST+'/debt_deals?id=eq.'+encodeURIComponent(id), { method:'DELETE', headers: sbHeaders({'Prefer':'return=minimal'}) }); }
        catch(e){ toast('Could not delete — check your connection'); return; }
        state.deals = state.deals.filter(function(d){ return d.id!==id; });
        renderAll(); toast('Deal deleted');
      });
      function patchDealRemoteDelete(){ return Promise.resolve(); }

      var addNoteBtn = tr.querySelector('[data-act="addnote"]');
      if(addNoteBtn) addNoteBtn.addEventListener('click', async function(){
        var ta = tr.querySelector('textarea[data-act="newnote"]');
        var text = ta.value.trim(); if(!text) return;
        var entry = { text:text, author:(state.session && state.session.email)||'Unknown', at:new Date().toISOString() };
        rec.notesLog = (rec.notesLog||[]).concat([entry]); renderTable();
        try{ await patchDealRemote(rec.id, { notes_log: rec.notesLog }); }
        catch(e){ toast('Note not saved — check your connection'); }
      });

      var linkInput = tr.querySelector('[data-act="linksearch"]');
      var linkDropdown = tr.querySelector('[data-act="linkdropdown"]');
      if(linkInput){
        var searchTimer;
        linkInput.addEventListener('input', function(){
          var term = this.value.trim();
          clearTimeout(searchTimer);
          if(term.length<2){ linkDropdown.style.display='none'; return; }
          searchTimer = setTimeout(async function(){
            var results = await searchProspects(term);
            if(!results.length){ linkDropdown.style.display='none'; return; }
            linkDropdown.innerHTML = results.map(function(p){
              return '<div data-pid="'+p.id+'" data-pname="'+esc(p.owner_name)+'">'+esc(p.owner_name)+'<br><span style="color:var(--ink-faint);font-size:11px;">'+esc(p.situs_address||p.mailing_address||'')+'</span></div>';
            }).join('');
            linkDropdown.style.display = 'block';
            linkDropdown.querySelectorAll('div').forEach(function(opt){
              opt.addEventListener('click', async function(){
                rec.linkedProspectId = opt.getAttribute('data-pid');
                rec.linkedProspectName = opt.getAttribute('data-pname');
                linkDropdown.style.display = 'none';
                delete state.linkedProspectCache[rec.id];
                renderTable();
                loadLinkedDetailFor(rec);
                try{ await patchDealRemote(rec.id, { linked_prospect_id: rec.linkedProspectId, linked_prospect_name: rec.linkedProspectName }); toast('Linked'); }
                catch(e){ toast('Link not saved — check your connection'); }
              });
            });
          }, 300);
        });
      }
      var unlinkBtn = tr.querySelector('[data-act="unlink"]');
      if(unlinkBtn) unlinkBtn.addEventListener('click', async function(){
        rec.linkedProspectId = null; rec.linkedProspectName = null;
        delete state.linkedProspectCache[rec.id];
        renderTable();
        try{ await patchDealRemote(rec.id, { linked_prospect_id: null, linked_prospect_name: null }); }
        catch(e){ toast('Unlink not saved — check your connection'); }
      });
    });
  }

  function renderLinkedDetailHtml(cached){
    if(!cached) return 'Loading linked prospect details…';
    var parts = [];
    if(cached.situs_address) parts.push('📍 '+esc(cached.situs_address));
    if(cached.property_value!=null) parts.push('Value: '+fmtMoney(cached.property_value));
    if(cached.tenure_years!=null) parts.push('Tenure: '+cached.tenure_years+' yr');
    if(cached.owner_occupied!=null) parts.push('Owner-occ: '+(cached.owner_occupied?'Yes':'No'));
    if(cached.lien_lender) parts.push('Lender: '+esc(cached.lien_lender));
    if(cached.lien_balance!=null) parts.push('Lien balance: '+fmtMoney(cached.lien_balance));
    return parts.length ? parts.join(' · ') : 'No additional property details on file.';
  }
  async function loadLinkedDetailFor(rec){
    if(!rec.linkedProspectId) return;
    var detail = await fetchLinkedProspectDetail(rec.linkedProspectId);
    state.linkedProspectCache[rec.id] = detail;
    var el = document.getElementById('linkedDetail-'+rec.id);
    if(el) el.innerHTML = renderLinkedDetailHtml(detail);
  }
  function renderScenarioHistoryHtml(cached){
    if(!cached) return 'Loading…';
    var items = [];
    (cached.slb||[]).forEach(function(s){
      items.push('<div style="margin-bottom:4px;">📄 SLB — cap rate '+(s.cap_rate!=null?s.cap_rate+'%':'—')+', net proceeds '+(s.net_proceeds!=null?fmtMoney(s.net_proceeds):'—')+' — '+esc(s.created_by||'')+' · '+formatWhen(s.created_at)+'</div>');
    });
    (cached.debtCap||[]).forEach(function(s){
      items.push('<div style="margin-bottom:4px;">📊 '+esc(s.instrument_type||'Debt Capacity')+' — '+(s.sized_amount!=null?fmtMoney(s.sized_amount):'—')+' at '+(s.effective_cost!=null?s.effective_cost+'%':'—')+' — '+esc(s.created_by||'')+' · '+formatWhen(s.created_at)+'</div>');
    });
    (cached.audits||[]).forEach(function(a){
      items.push('<div style="margin-bottom:4px;">🧾 Treasury Audit — '+esc(a.company_name||'')+' — '+esc(a.created_by||'')+' · '+formatWhen(a.updated_at)+'</div>');
    });
    return items.length ? items.join('') : 'No saved scenarios yet for this deal.';
  }
  async function loadScenarioHistoryForDealRow(rec){
    var history = await fetchScenarioHistoryForDeal(rec.id);
    state.scenarioCache[rec.id] = history;
    var el = document.getElementById('scenarioHistory-'+rec.id);
    if(el) el.innerHTML = renderScenarioHistoryHtml(history);
  }

  function renderAll(){ renderSummary(); renderTable(); }

  async function loadAppData(){
    $('tableWrap').innerHTML = '<div class="empty"><div class="display">Loading…</div><p>Connecting to the database.</p></div>';
    try{ state.deals = await fetchAllDeals(); }
    catch(e){ toast('Could not connect to the database — check your connection and refresh'); }
    renderAll();
  }
  async function enterApp(){
    $('authGate').style.display = 'none';
    $('mainApp').style.display = 'block';
    await loadAppData();
  }

  (async function init(){
    loadStoredSession();
    var ok = await ensureValidSession();
    if(ok){ await enterApp(); }
    else { $('authGate').style.display = 'flex'; $('mainApp').style.display = 'none'; }
  })();
})();
</script>
</body>
</html>
